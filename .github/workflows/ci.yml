# Verification-only CI: mirrors the local pre-merge gate (scripts/verify.sh) plus
# the pytest suites + coverage gate, across a tri-OS matrix. Releases stay local via
# ci/release.py — this workflow must never tag or publish (release flow is local-only).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # ubuntu + windows are required; macOS proves portability without blocking on
    # runner flakiness.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev toolchain
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          # uv is the blessed hook launcher; install it so behavioral hook tests that
          # invoke `uv run` (the production invocation) run in CI as they do locally.
          python -m pip install uv

      # Portable gate set: lint-no-bare-python, ruff, check-versions, validate-plugins,
      # hook-runtime-controls, vendored-sync, frontmatter, lint-changelog, skill-index,
      # check-notice, check-doc-links.
      - name: Pre-merge gate (scripts/verify.sh)
        run: bash scripts/verify.sh

      - name: shellcheck (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find . -path ./.git -prune -o -name '*.sh' -print0 | xargs -0 -r shellcheck -S warning

      - name: PSScriptAnalyzer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          $files = Get-ChildItem -Recurse -Filter *.ps1 | Where-Object { $_.FullName -notmatch '\\\.git\\' }
          $r = $files | ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Settings ./PSScriptAnalyzerSettings.psd1 }
          if ($r) { $r | Format-Table -AutoSize | Out-String -Width 200 | Write-Output; exit 1 }
          Write-Output "PSScriptAnalyzer: clean"

      # Per-directory pytest: repo-root collection trips on duplicated test basenames
      # across plugins, and per-plugin conftest.py files set up sys.path relative to
      # their own directory. Coverage is combined per-OS and gated at >=90% (Python).
      - name: Tests + coverage (>=90% gate)
        run: |
          set -euo pipefail
          python -m coverage erase
          python -m coverage run -p -m pytest ci/tests -q
          for d in plugins/*/tests; do
            if [ -d "$d" ]; then
              echo "::group::$d"
              python -m coverage run -p -m pytest "$d" -q
              echo "::endgroup::"
            fi
          done
          python -m coverage combine
          python -m coverage report --fail-under=90

  # Authoritative manifest validation via the official `claude plugin validate`.
  # Offline + deterministic (verified to run with an empty config dir, no auth), so it
  # is safe in CI and complements the stdlib ci/validate-plugins.py gate. Verify-only.
  validate-manifests:
    name: claude plugin validate (--strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace + every plugin (strict)
        env:
          CLAUDE_CONFIG_DIR: ${{ runner.temp }}/claude-empty
        run: |
          set -euo pipefail
          claude plugin validate . --strict
          for d in plugins/*/; do
            echo "::group::$d"
            claude plugin validate "./$d" --strict
            echo "::endgroup::"
          done
